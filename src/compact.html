<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Companion — Compact</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="compact.css">
</head>
<body>
<div class="compact-bar" id="compactBar">
  <div class="compact-header" id="compactHeader">
    <div class="clawd-icon" id="claudeIcon">
      <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <rect x="2" y="2" width="16" height="13" rx="2" fill="#c4765a"/>
        <!-- Left eye -->
        <rect x="5" y="5" width="3" height="3" fill="#1a1a1a"/>
        <!-- Right eye -->
        <rect x="12" y="5" width="3" height="3" fill="#1a1a1a"/>
        <!-- Legs -->
        <rect x="3" y="15" width="3" height="4" fill="#c4765a"/>
        <rect x="8.5" y="15" width="3" height="4" fill="#c4765a"/>
        <rect x="14" y="15" width="3" height="4" fill="#c4765a"/>
      </svg>
    </div>
    <div class="compact-info" id="compactInfo">
      <div class="compact-title">CC Companion</div>
      <div class="compact-summary" id="compactSummary">no instances</div>
    </div>
    <div class="header-buttons no-drag" id="headerButtons">
      <button class="snap-btn no-drag" id="themeBtn" title="Toggle light/dark">☀</button>
      <button class="snap-btn no-drag" id="snapBtn" title="Center">⊙</button>
      <button class="snap-btn no-drag" id="minimizeBtn" title="Minimize">−</button>
      <button class="snap-btn no-drag" id="closeBtn" title="Quit">✕</button>
    </div>
  </div>
  <div class="detail-panel no-drag" id="detailPanel"></div>
  <div class="compact-instances no-drag" id="compactInstances"></div>
</div>
<script src="compact.js"></script>
</body>
</html>
